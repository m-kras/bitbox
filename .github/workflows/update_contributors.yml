name: Update Contributors

on:
  pull_request:
    types: [closed]

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          AUTHOR=${{ github.event.pull_request.user.login }}

          # Extract tool name from PR title
          TOOL=$(echo "${{ github.event.pull_request.title }}" | grep -oP '\[tool\]\s*\K\S+' || echo "")

          if [ -z "$TOOL" ]; then
            TOOL=$(gh pr diff $PR_NUM --repo $REPO | grep -oP '^\+\+\+ b/tools/\K[^.]+' | head -1 || echo "")
          fi

          if [ -z "$AUTHOR" ]; then
            echo "No author found, skipping"
            exit 0
          fi

          BRANCH="contributor/${AUTHOR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Update README
          if grep -q "\[@$AUTHOR\]" README.md; then
            if [ -n "$TOOL" ] && ! grep -q "$TOOL" README.md; then
              sed -i "/\[@$AUTHOR\]/ s/ *|$/ $TOOL |/" README.md
            fi
          else
            if [ -n "$TOOL" ]; then
              NEW_ROW="| [@${AUTHOR}](https://github.com/${AUTHOR}) | ${TOOL} |"
            else
              NEW_ROW="| [@${AUTHOR}](https://github.com/${AUTHOR}) | contributor |"
            fi
            sed -i "/^<!-- Contributors/i\\$NEW_ROW" README.md
          fi

          # Create PR if there are changes
          git add README.md
          git diff --staged --quiet && exit 0

          git commit -m "docs: add @${AUTHOR} to contributors"
          git push origin "$BRANCH"
          gh pr create --repo "$REPO" --head "$BRANCH" --base main \
            --title "docs: add @${AUTHOR} to contributors" \
            --body "Automated PR to add contributor @${AUTHOR} for \`${TOOL}\`"
